version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corridor_monitor
    ports:
      - "5432:5432"
    volumes:
      - corridor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d corridor_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 8080
      POLL_SECONDS: 300
      SAMPLE_LIMIT: 40
      BASELINE_ALPHA: 0.2
      DATABASE_URL: postgres://postgres:postgres@db:5432/corridor_monitor
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  corridor_pgdata:

